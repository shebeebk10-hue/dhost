<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1>Edit Invoice Page</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Invoice Number
            </label>

            <input type="text"
                name="invoice_number"
                value="{{ invoice.invoice_number }}"
                class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Date
            </label>

            <input type="date"
                name="date"
                value="{{ invoice.date|date:'Y-m-d' }}"
                class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Item Name
            </label>

            <input type="text"
                   name="item_name"
                   value="{{ invoice.item_name }}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Quantity
            </label>

            <input type="number"
                   name="qty"
                   value="{{ invoice.qty }}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Weight
            </label>

            <input type="number"
                step="0.01"
                name="weight"
                value="{{ invoice.weight }}"
                class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Rate
            </label>

            <input type="number"
                   name="rate"
                   value="{{ invoice.rate }}"
                   class="form-control">

        </div>


        <div class="mb-3">

            <label class="form-label">
                Paid Amount
            </label>

            <input type="number"
                step="0.01"
                name="paid_amount"
                value="{{ invoice.paid_amount }}"
                class="form-control">

        </div>

        <button type="submit"
                class="btn btn-warning">

            Update Invoice

        </button>

    </form>

</div>

</body>
</html>
