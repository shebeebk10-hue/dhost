<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Invoice</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        :root{
            --primary-orange:#ff6b00;
            --dark-bg:#121212;
            --card-bg:#1e1e1e;
            --text-light:#f8f9fa;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:var(--dark-bg);
            color:var(--text-light);
            min-height:100vh;
            overflow-x:hidden;
        }

        /* Background Glow */

        body::before{
            content:"";
            position:fixed;
            width:500px;
            height:500px;
            background:radial-gradient(circle,
            rgba(255,107,0,0.20),
            transparent 70%);
            top:-120px;
            left:-120px;
            filter:blur(80px);
            z-index:0;
        }

        body::after{
            content:"";
            position:fixed;
            width:400px;
            height:400px;
            background:radial-gradient(circle,
            rgba(255,255,255,0.05),
            transparent 70%);
            bottom:-100px;
            right:-100px;
            filter:blur(80px);
            z-index:0;
        }

        /* Main Wrapper */

        .edit-wrapper{
            position:relative;
            z-index:1;
            max-width:850px;
            margin:60px auto;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 8px 40px rgba(0,0,0,0.5);
        }

        .title{
            font-size:3rem;
            font-weight:700;
            margin-bottom:35px;
            color:white;
        }

        /* Form */

        .form-group{
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-weight:600;
            color:#ddd;
        }

        input{
            width:100%;
            background:#222;
            border:1px solid #333;
            color:white;
            border-radius:12px;
            padding:15px;
            outline:none;
            transition:0.3s;
            font-size:15px;
        }

        input:focus{
            border-color:var(--primary-orange);
            box-shadow:0 0 10px rgba(255,107,0,0.3);
        }

        /* Buttons */

        .btn-group{
            margin-top:35px;
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .glass-btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:14px 35px;
            border:none;
            border-radius:50px;
            font-weight:600;
            transition:0.3s;
            cursor:pointer;
            text-decoration:none;
            min-width:180px;
            font-size:15px;
        }

        .update-btn{
            background:rgba(255,107,0,0.15);
            border:1px solid rgba(255,107,0,0.4);
            color:white;
        }

        .update-btn:hover{
            background:rgba(255,107,0,0.35);
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,107,0,0.3);
        }

        .cancel-btn{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            color:white;
        }

        .cancel-btn:hover{
            background:rgba(255,255,255,0.15);
            transform:translateY(-3px);
        }

        /* Responsive */

        @media(max-width:768px){

            .edit-wrapper{
                width:92%;
                padding:30px 20px;
            }

            .title{
                font-size:2rem;
            }

            .btn-group{
                flex-direction:column;
            }

            .glass-btn{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div class="edit-wrapper">

    <h1 class="title">
        Edit Invoice
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label>
                Invoice Number
            </label>

            <input type="text"
                   name="invoice_number"
                   value="{{ invoice.invoice_number }}">

        </div>

        <div class="form-group">

            <label>
                Date
            </label>

            <input type="date"
                   name="date"
                   value="{{ invoice.date|date:'Y-m-d' }}">

        </div>

        <div class="form-group">

            <label>
                Item Name
            </label>

            <input type="text"
                   name="item_name"
                   value="{{ invoice.item_name }}">

        </div>

        <div class="form-group">

            <label>
                Quantity
            </label>

            <input type="number"
                   name="qty"
                   value="{{ invoice.qty }}">

        </div>

        <div class="form-group">

            <label>
                Weight
            </label>

            <input type="number"
                   step="0.01"
                   name="weight"
                   value="{{ invoice.weight }}">

        </div>

        <div class="form-group">

            <label>
                Rate
            </label>

            <input type="number"
                   name="rate"
                   value="{{ invoice.rate }}">

        </div>

        <div class="form-group">

            <label>
                Paid Amount
            </label>

            <input type="number"
                   step="0.01"
                   name="paid_amount"
                   value="{{ invoice.paid_amount }}">

        </div>

        <div class="btn-group">

            <button type="submit"
                    class="glass-btn update-btn">

                Update Invoice

            </button>

            <a href="{% url 'view_details' invoice.shop.id %}"
               class="glass-btn cancel-btn">

                Cancel

            </a>

        </div>

    </form>

</div>

</body>
</html>
