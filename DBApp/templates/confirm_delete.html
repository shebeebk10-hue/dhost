<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Invoice</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        :root{
            --primary-orange:#ff6b00;
            --dark-bg:#121212;
            --text-light:#f8f9fa;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:var(--dark-bg);
            color:var(--text-light);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            padding:20px;
        }

        /* Background Glow */

        body::before{
            content:"";
            position:fixed;
            width:500px;
            height:500px;
            background:radial-gradient(circle,
            rgba(255,107,0,0.20),
            transparent 70%);
            top:-120px;
            left:-120px;
            filter:blur(80px);
            z-index:0;
        }

        body::after{
            content:"";
            position:fixed;
            width:400px;
            height:400px;
            background:radial-gradient(circle,
            rgba(255,255,255,0.05),
            transparent 70%);
            bottom:-100px;
            right:-100px;
            filter:blur(80px);
            z-index:0;
        }

        /* Delete Card */

        .delete-card{
            position:relative;
            z-index:1;
            width:100%;
            max-width:500px;
            padding:45px 35px;
            border-radius:28px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 8px 40px rgba(0,0,0,0.5);
            text-align:center;
        }

        .delete-icon{
            width:90px;
            height:90px;
            margin:0 auto 25px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:rgba(255,0,0,0.12);
            border:1px solid rgba(255,0,0,0.25);
            font-size:40px;
        }

        h2{
            font-size:32px;
            font-weight:700;
            margin-bottom:15px;
        }

        p{
            color:#bdbdbd;
            margin-bottom:35px;
            line-height:1.7;
            font-size:15px;
        }

        /* Form */

        form{
            width:100%;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:18px;
            flex-wrap:wrap;
        }

        .glass-btn{
            flex:1;
            min-width:180px;
            padding:15px 20px;
            border-radius:50px;
            font-weight:600;
            font-size:15px;
            text-decoration:none;
            transition:0.3s;
            cursor:pointer;
            border:none;
        }

        .delete-btn{
            background:rgba(255,0,0,0.15);
            border:1px solid rgba(255,0,0,0.4);
            color:white;
        }

        .delete-btn:hover{
            background:rgba(255,0,0,0.35);
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,0,0,0.3);
        }

        .cancel-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            background:rgba(255,107,0,0.15);
            border:1px solid rgba(255,107,0,0.4);
            color:white;
        }

        .cancel-btn:hover{
            background:rgba(255,107,0,0.35);
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,107,0,0.3);
        }

        @media(max-width:600px){

            .delete-card{
                padding:35px 20px;
            }

            h2{
                font-size:26px;
            }

            .btn-group{
                flex-direction:column;
            }

            .glass-btn{
                width:100%;
            }
        }

    </style>
</head>

<body>

    <div class="delete-card">

        <div class="delete-icon">
            ⚠
        </div>

        <h2>Delete Invoice?</h2>

        <p>
            Are you sure you want to permanently delete this invoice?
            This action cannot be undone.
        </p>

        <form method="POST" action="">

            {% csrf_token %}

            <div class="btn-group">

                <button type="submit"
                        class="glass-btn delete-btn">

                    Yes, Delete

                </button>

                <a href="{% url 'view_details' invoice.shop.id %}"
                   class="glass-btn cancel-btn">

                    No, Cancel

                </a>

            </div>

        </form>

    </div>

</body>
</html>
