<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary-orange:#ff6b00;
            --dark-bg:#121212;
            --card-bg:#1e1e1e;
            --text-light:#f8f9fa;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:var(--dark-bg);
            color:var(--text-light);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        /* Background Glow */
        body::before{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,107,0,0.15);
            border-radius:50%;
            filter:blur(120px);
            top:-100px;
            left:-100px;
        }

        body::after{
            content:'';
            position:absolute;
            width:400px;
            height:400px;
            background:rgba(255,107,0,0.1);
            border-radius:50%;
            filter:blur(100px);
            bottom:-100px;
            right:-100px;
        }

        .login-box{
            position:relative;
            z-index:2;
            width:100%;
            max-width:420px;
            background:var(--card-bg);
            padding:40px;
            border-radius:20px;
            border:1px solid #2d2d2d;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
            text-align:center;
            animation:fadeIn 0.5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .icon-box{
            width:80px;
            height:80px;
            background:rgba(255,107,0,0.1);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0 auto 20px;
        }

        .icon-box i{
            font-size:32px;
            color:var(--primary-orange);
        }

        h2{
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            color:#9ca3af;
            margin-bottom:30px;
            font-size:14px;
        }

        .form-control{
            background:#111;
            border:1px solid #333;
            color:white;
            padding:14px;
            border-radius:12px;
        }

        .form-control:focus{
            background:#111;
            color:white;
            border-color:var(--primary-orange);
            box-shadow:0 0 0 0.2rem rgba(255,107,0,0.2);
        }

        .btn-login{
            width:100%;
            background:var(--primary-orange);
            border:none;
            padding:14px;
            border-radius:12px;
            font-weight:600;
            margin-top:18px;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#ff7f26;
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(255,107,0,0.3);
        }

        .error{
            margin-top:18px;
            background:rgba(255,0,0,0.1);
            color:#ff6b6b;
            padding:12px;
            border-radius:10px;
            border:1px solid rgba(255,0,0,0.2);
            font-size:14px;
        }

        .brand{
            color:var(--primary-orange);
            font-weight:700;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <div class="icon-box">
            <i class="fas fa-lock"></i>
        </div>

        <h2>
            <span class="brand">DOST CHICKEN</span>
        </h2>

        <p class="subtitle">
            Enter password to access shop management
        </p>

        <form method="POST">

            {% csrf_token %}

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>

            <button type="submit" class="btn btn-login text-white">
                <i class="fas fa-unlock-alt me-2"></i>
                Open Shops
            </button>

        </form>

        {% if error %}
            <div class="error">
                <i class="fas fa-circle-exclamation me-2"></i>
                {{ error }}
            </div>
        {% endif %}

    </div>

</body>
</html>
