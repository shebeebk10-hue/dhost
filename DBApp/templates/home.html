<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dost Chicken</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet">

<style>

:root{
    --primary:#ff8c21;
    --dark:#0f0f0f;
    --card:rgba(255,255,255,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    overflow-y:auto;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url('https://images.unsplash.com/photo-1562967914-608f82629710?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
    color:rgb(0, 0, 0);
    position:relative;
}

/* Glow */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(255,140,33,0.35),transparent 70%);
    top:-200px;
    left:-200px;
    filter:blur(100px);
    animation:floatGlow 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(255,255,255,0.08),transparent 70%);
    bottom:-180px;
    right:-180px;
    filter:blur(100px);
    animation:floatGlow2 10s ease-in-out infinite;
}

@keyframes floatGlow{
    0%{transform:translateY(0px);}
    50%{transform:translateY(30px);}
    100%{transform:translateY(0px);}
}

@keyframes floatGlow2{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-30px);}
    100%{transform:translateY(0px);}
}

/* Navbar */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:14px 0;
}

.navbar-brand{
    color:var(--primary)!important;
    font-size:1.5rem;
    font-weight:900;
}

/* Hero */
.hero-wrapper{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:90px 20px 40px;
    position:relative;
    z-index:1;
}

.glass-card{
    width:100%;
    max-width:700px;
    text-align:center;
    padding:clamp(25px,5vw,60px);
    border-radius:35px;
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.hero-image{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid rgba(255,140,33,0.5);
    margin-bottom:20px;
}

/* Text */
h1{
    font-size:clamp(2.2rem,6vw,4.5rem);
    font-weight:900;
}

.highlight{
    color:var(--primary);
}

.tagline{
    font-size:1rem;
    color:#d5d5d5;
    margin:15px auto 30px;
    max-width:500px;
}

/* Buttons */
.hero-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.btn-open,
.btn-contact{
    padding:14px 35px;
    border-radius:60px;
    font-weight:700;
    text-decoration:none;
    transition:0.3s;
}

.btn-open{
    background:linear-gradient(135deg,#ff8c21,#ff5e00);
    color:white;
}

.btn-open:hover{
    transform:translateY(-4px);
}

.btn-contact{
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    background:rgba(255,255,255,0.06);
}

.btn-contact:hover{
    background:rgba(255,255,255,0.15);
}

/* Mobile */
@media(max-width:480px){
    .hero-buttons a{
        width:100%;
        text-align:center;
    }
}

/* Disable heavy effects on mobile */
@media(max-width:768px){
    body::before,
    body::after{
        display:none;
    }
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="fas fa-drumstick-bite me-2"></i>DOST CHICKEN
        </a>
    </div>
</nav>

<!-- Hero -->
<section class="hero-wrapper">
    <div class="glass-card">

        <img src="https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?q=80&w=800&auto=format&fit=crop"
             class="hero-image" alt="Chicken">

        <h1>Dost <span class="highlight">Chicken</span></h1>

        <p class="tagline">
            Smart Poultry Management System with invoice tracking,
            branch control, sales monitoring, and inventory system.
        </p>

        <div class="hero-buttons">
            <a href="{% url 'shops_auth' %}" class="btn-open">
                Login
            </a>

            <a href="https://wa.me/919747394502" class="btn-contact" target="_blank">
                <i class="fab fa-whatsapp me-2"></i> WhatsApp
            </a>
        </div>

    </div>
</section>

</body>
</html>
