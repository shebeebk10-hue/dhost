<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dost Chicken</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap"
          rel="stylesheet">

    <style>

        :root{
            --primary:#ff8c21;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            font-family:'Inter',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
            overflow:hidden;
            color:white;
        }

        /* Navbar */

        .navbar{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            z-index:1000;

            background:rgba(0,0,0,0.35);
            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .navbar-brand{
            color:var(--primary) !important;
            font-weight:800;
            letter-spacing:1px;
            font-size:1.3rem;
        }

        .nav-link{
            color:white !important;
            font-weight:500;
            transition:0.3s;
        }

        .nav-link:hover{
            color:var(--primary) !important;
        }

        /* Background Glow */

        body::before{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:
            radial-gradient(circle,
            rgba(255,140,33,0.25),
            transparent 70%);

            top:-100px;
            left:-100px;

            filter:blur(80px);
        }

        body::after{
            content:"";
            position:absolute;
            width:400px;
            height:400px;

            background:
            radial-gradient(circle,
            rgba(255,255,255,0.08),
            transparent 70%);

            bottom:-100px;
            right:-100px;

            filter:blur(80px);
        }

        /* Glass Card */

        .glass-card{
            position:relative;
            z-index:1;

            width:90%;
            max-width:600px;

            padding:40px;
            text-align:center;

            background:rgba(255,255,255,0.05);

            border-radius:25px;

            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:0 8px 40px rgba(0,0,0,0.5);
        }

        .logo-img{
            width:110px;
            height:110px;
            object-fit:cover;
            border-radius:50%;
            margin-bottom:18px;
        }

        h1{
            font-size:clamp(3rem,8vw,4.5rem);
            font-weight:900;
            letter-spacing:-1px;
            margin-bottom:10px;
        }

        p{
            color:#cfcfcf;
            margin-bottom:30px;
            letter-spacing:1px;
        }

        /* Button */

        .btn-open{
            display:inline-block;

            padding:14px 50px;

            border-radius:50px;

            font-weight:600;

            text-decoration:none;
            color:white;

            background:rgba(255,140,33,0.15);

            border:1px solid rgba(255,140,33,0.4);

            backdrop-filter:blur(10px);

            transition:all 0.3s ease;
        }

        .btn-open:hover{
            background:rgba(255,140,33,0.35);

            transform:translateY(-3px);

            box-shadow:0 10px 30px rgba(255,140,33,0.4);

            color:white;
        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fas fa-drumstick-bite me-2"></i>
                DOST CHICKEN
            </a>

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="tel:+919876543210">

                        <i class="fas fa-phone me-1"></i>
                        Contact

                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- Main Card -->

    <div class="glass-card">

        <h1>Dost Chicken</h1>

        <p>
            Crispy. Golden. Irresistible.
        </p>

        <a href="{% url 'shops_auth' %}" class="btn-open">
            Open
        </a>

    </div>

</body>
</html>
