<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dost Chicken | Add Invoice</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary-orange:#ff6b00;
            --dark-bg:#121212;
            --card-bg:#1e1e1e;
            --text-light:#f8f9fa;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:var(--dark-bg);
            color:var(--text-light);
            min-height:100vh;
        }

        /* Navbar */

        .navbar{
            background:rgba(18,18,18,0.95);
            backdrop-filter:blur(10px);
            border-bottom:2px solid var(--primary-orange);
        }

        .navbar-brand{
            font-weight:700;
            color:var(--primary-orange)!important;
            font-size:1.5rem;
        }

        .nav-link{
            color:var(--text-light)!important;
            transition:0.3s;
        }

        .nav-link:hover{
            color:var(--primary-orange)!important;
        }

        /* Background Glow */

        body::before{
            content:"";
            position:fixed;
            width:500px;
            height:500px;
            background:radial-gradient(circle,
            rgba(255,107,0,0.20),
            transparent 70%);
            top:-120px;
            left:-120px;
            filter:blur(80px);
            z-index:0;
        }

        body::after{
            content:"";
            position:fixed;
            width:400px;
            height:400px;
            background:radial-gradient(circle,
            rgba(255,255,255,0.05),
            transparent 70%);
            bottom:-100px;
            right:-100px;
            filter:blur(80px);
            z-index:0;
        }

        /* Main Card */

        .invoice-wrapper{
            position:relative;
            z-index:1;
            max-width:1250px;
            margin:50px auto;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 8px 40px rgba(0,0,0,0.5);
        }

        .title{
            font-size:3rem;
            font-weight:700;
            margin-bottom:20px;
        }

        .top-section{
            display:flex;
            justify-content:space-between;
            gap:40px;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .right-section{
            width:350px;
        }

        .invoice-row{
            margin-bottom:20px;
        }

        .invoice-row label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#ddd;
        }

        input,
        select{
            width:100%;
            background:#222;
            border:1px solid #333;
            color:white;
            border-radius:10px;
            padding:14px;
            outline:none;
            transition:0.3s;
        }

        input:focus,
        select:focus{
            border-color:var(--primary-orange);
            box-shadow:0 0 10px rgba(255,107,0,0.3);
        }

        /* Table */

        .table-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            overflow:hidden;
            border-radius:15px;
        }

        thead{
            background:rgba(255,107,0,0.15);
        }

        th{
            padding:18px;
            text-align:left;
            color:white;
            font-size:15px;
        }

        td{
            padding:18px;
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .table-input{
            background:#222;
            border:1px solid #333;
        }

        .total-cell{
            font-weight:700;
            color:var(--primary-orange);
            text-align:right;
        }

        /* Bottom Section */

        .bottom-section{
            margin-top:40px;
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:40px;
            flex-wrap:wrap;
        }

        .glass-btn{
            display:inline-flex;
            align-items:center;
            gap:10px;
            padding:14px 35px;
            border:none;
            border-radius:50px;
            background:rgba(255,107,0,0.15);
            border:1px solid rgba(255,107,0,0.4);
            color:white;
            font-weight:600;
            transition:0.3s;
            cursor:pointer;
        }

        .glass-btn:hover{
            background:rgba(255,107,0,0.35);
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,107,0,0.3);
        }

        .summary-box{
            width:420px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            padding:25px;
        }

        .summary-row{
            display:flex;
            justify-content:space-between;
            padding:14px 0;
            border-bottom:1px solid rgba(255,255,255,0.08);
            color:#ddd;
        }

        .summary-row:last-child{
            border-bottom:none;
        }

        .grand{
            font-size:20px;
            font-weight:700;
            color:white;
        }

        .closing{
            color:var(--primary-orange);
            font-size:22px;
            font-weight:700;
        }

        .shop-header-card{
            display:flex;
            align-items:center;
            gap:15px;
            padding:20px;
            border-radius:15px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            margin-bottom:20px;
        }

        .shop-header-card i{
            font-size:28px;
            color:var(--primary-orange);
        }

        .shop-header-card h2{
            margin:0;
            font-size:24px;
        }

        /* Responsive */

        @media(max-width:768px){

    table, thead, tbody, th, td, tr{
        display:block;
        width:100%;
    }

    thead{
        display:none; /* header hide on mobile */
    }

    tr{
        margin-bottom:20px;
        background:rgba(255,255,255,0.03);
        padding:15px;
        border-radius:12px;
    }

    td{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:10px 0;
        border:none;
    }

    td::before{
        content:attr(data-label);
        font-weight:600;
        color:#aaa;
    }

    .table-input{
        width:60%;
    }
}

    </style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">

    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="fas fa-drumstick-bite me-2"></i>DOST CHICKEN
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'shops' %}">
                        Shops
                    </a>
                </li>

                 <li class="nav-item">
                    <a class="nav-link" href="{% url 'view_details' 1 %}">
                        Invoices
                    </a>
                </li>


                <li class="nav-item">
                    <a class="nav-link"
                       href="tel:+919876543210">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>


<form method="POST">
    {% csrf_token %}



<div class="invoice-wrapper">

    <div class="top-section">

        <div>

            <div class="shop-header-card">
                <i class="fas fa-store"></i>
                <div>
                    <h2>{{ shop.name }}</h2>
                    <small>Invoice Entry</small>
                </div>
            </div>

            <div class="invoice-row">

                <label>Date</label>

                <input type="date"
                       name="date"
                       value="{{ today|date:'Y-m-d' }}"
                       required>

            </div>

        </div>


        <div class="right-section">

            <div class="invoice-row">

                <label>Invoice #</label>

                <input type="text"
                       name="invoice_number"
                       value="INV-2026-001"
                       required>

            </div>


            


            <div class="invoice-row">

                <label>Previous Balance</label>

                <input type="text"
                       id="prev-balance"
                       value="{{ previous_balance }}"
                       readonly>

            </div>

        </div>

    </div>


    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>Item</th>
                    <th>Qty</th>
                    <th>Weight</th>
                    <th>Rate</th>
                    <th>Paid Amount</th>
                    <th style="text-align:right">
                        Total
                    </th>

                </tr>

            </thead>


            <tbody>

                <tr>

                    <td data-label="Item">

                        <input type="text"
                               name="item_name"
                               placeholder="Item Name"
                               class="table-input"
                               required>

                    </td>

                    <td data-label="Qty">

                        <input type="number"
                               name="qty"
                               id="qty"
                               placeholder="1"
                               class="table-input"
                               required>

                    </td>

                    <td data-label="Weight">

                        <input type="number"
                        name="weight"
                        id="weight"
                        placeholder="10"
                        step="0.01"
                        class="table-input"
                        required>

                    </td>

                    <td data-label="Rate">

                        <input type="number"
                               name="rate"
                               id="rate"
                               placeholder="100"
                               step="0.01"
                               class="table-input"
                               required>

                    </td>

                    <td data-label="Paid Amount">

                        <input type="number"
                            name="paid_amount"
                            id="paid_amount"
                            placeholder="0"
                            step="0.01"
                            class="table-input">

                    </td>

                    <td data-label="total"=""="total-cell"
                        id="row-total">

                        100.00

                    </td>

                </tr>

            </tbody>

        </table>

    </div>


    <div class="bottom-section">

        <button type="submit"
                class="glass-btn">

            <i class="fas fa-save"></i>
            Save Invoice

        </button>


        <div class="summary-box">

            <div class="summary-row">

                <span>Grand Total</span>

                <span id="current-total">
                    100.00
                </span>

            </div>


            <div class="summary-row">

                <span>Previous Balance</span>

                <span id="show-prev-balance">
                    0.00
                </span>

            </div>


            
            <div class="summary-row closing">

                <span>Closing Balance</span>

                <span id="closing-balance">
                    100.00
                </span>

            </div>

        </div>

    </div>

</div>

</form>


<script>

    const qtyInput =
        document.getElementById('qty');

    const rateInput =
        document.getElementById('rate');
    
    const weightInput =
        document.getElementById('weight');

    const prevBalanceInput =
        document.getElementById('prev-balance');

    


    function calculateInvoice(){

        let qty =
            parseFloat(qtyInput.value) || 0;

        let rate =
            parseFloat(rateInput.value) || 0;

        let prev =
            parseFloat(prevBalanceInput.value) || 0;

        let weight =
            parseFloat(weightInput.value) || 0;

        let total =
            weight * rate;

        let closing =
            total + prev;


        document.getElementById('row-total').innerText =
            total.toFixed(2);

        document.getElementById('current-total').innerText =
            total.toFixed(2);

        document.getElementById('show-prev-balance').innerText =
            prev.toFixed(2);

        document.getElementById('grand-total').innerText =
            closing.toFixed(2);

        document.getElementById('closing-balance').innerText =
            closing.toFixed(2);

    }


    qtyInput.addEventListener(
        'input',
        calculateInvoice
    );

    rateInput.addEventListener(
        'input',
        calculateInvoice
    );

    weightInput.addEventListener(
        'input',
        calculateInvoice
    );

   


    calculateInvoice();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
